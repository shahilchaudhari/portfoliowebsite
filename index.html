<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="header">

        <div class="menu-icon" id="menu-icon">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <nav class="navbar">
            <ul class="nav-list">
                <li><a href="#home">Home</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#travel">Travel</a></li>
            </ul>
        </nav>
        <div class="search-container">
            <input type="text" placeholder="Search..." class="search-bar">
        </div>

        <button class="reachMeBtn">Reach Me</button>

        <!-- Popup Contact Form -->
        <div id="contactPopup" class="popup">
            <div class="popup-content">
                <span class="close">&times;</span>
                <h2>Reach Me</h2>
                <form action="https://formsubmit.co/3cddb0ff0c3120b38a858592fdda83b2" method="POST">
                    <!-- <input type="hidden" name="_captcha" value="false"> -->
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <input type="tel" name="phone" placeholder="Your phone " pattern="[0-9]{10}">
                    <textarea name="message" placeholder="Your Message" required></textarea>
                    <input type="hidden" name="_template" value="table">
                    <button type="submit">Send</button>
                </form>
            </div>
        </div>

        <!-- Thank You Popup -->
        <div id="thankYouPopup" class="popup">
            <div class="p-content">
                <span class="close">&times;</span>
                <div class="tick-mark">✔</div> 
                <h2>Thank You!</h2>
                <p>Your message has been sent successfully. We'll get back to you soon.</p>
            </div>
        </div>

    </header>



    <section id="home">
        <div class="introduction">
            <div class="intro-text">
                <h1>Hi, I'm <span class="name">Shahil</span></h1>
                <p><span class="typing-animation"></span></p>
                <p class="description">
                    Passionate about creating innovative solutions and exploring the world.
                    I love turning ideas into reality through code and design.
                </p>
            </div>

            <div class="intro-image">
                <img src="./assets/portfolio2.jpeg" alt="this is my photo">
            </div>
        </div>
    </section>

    <!-- projects section -->

</body>

</html>
